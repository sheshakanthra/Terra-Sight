# Render blueprint for the TerraSight API (Docker).
#
# Import via Render → New → Blueprint, pointing at this repo. Secrets marked
# sync:false must be filled in the Render dashboard.
#
# The daily refresh is NOT a Render cron (that service type needs a paid plan).
# Instead a free GitHub Actions schedule calls the secret-guarded
# /internal/refresh-all endpoint — see .github/workflows/daily-refresh.yml.
# Set the SAME CRON_SECRET value here and in the repo's GitHub Actions secrets.

services:
  # ---- FastAPI raster service (Docker) ----------------------------------
  - type: web
    name: terrasight-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      # Must be the deployed web origin, or the browser is blocked by CORS.
      - key: WEB_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Same value as the GitHub Actions CRON_SECRET secret.
      - key: CRON_SECRET
        sync: false
